<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meny</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Helvetica, Arial, sans-serif;
    background: #fff;
    color: #111;
}

.hero {
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
}

.hero img {
    width: 100%;
    display: block;
}

.content {
    text-align: center;
    padding: 32px 24px 48px;
}

h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.03em;
}

p {
    font-size: 16px;
    color: #666;
    margin-bottom: 28px;
}

.button {
    display: inline-block;
    padding: 16px 36px;
    background: #111;
    color: white;
    text-decoration: none;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 600;
    transition: transform 0.2s ease;
}

.button:hover {
    transform: translateY(-1px);
}
</style>

</head>
<body>

<div class="hero">
    <img src="forside.jpg" alt="Forside">
</div>

<div class="content">
    <h1>Mellom Forfall og Fellesskap</h1>
    <p>Tre piloter som utfordrer fremtidens boformer.</p>

    <a href="Mellom Forfall og Fellesskap.pdf" class="button">
        Se oppgaveheftet
    </a>
</div>

</body>
</html>
